{% extends 'base.html' %}
{% block title %}Reset Link Sent — Daily Reporting System{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="auth-logo">📊 DailyReport</span>
      <h1>Check Your Email</h1>
      <p>We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</p>
    </div>
    <div class="auth-footer">
      <a href="{% url 'login' %}" class="btn btn-primary w-100">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
