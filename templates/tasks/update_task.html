{% extends 'base.html' %}
{% block title %}Update Task — Daily Reporting System{% endblock %}

{% block content %}
<div class="topbar">
  <h1>🔄 Update Task Status</h1>
</div>

<div class="glass-card" style="max-width: 500px;">
  <h3 class="mb-2">{{ task.title }}</h3>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
    </div>
    {% endfor %}
    <div class="d-flex gap-1 mt-2">
      <button type="submit" class="btn btn-primary">Update Status</button>
      <a href="{% url 'my_tasks' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
